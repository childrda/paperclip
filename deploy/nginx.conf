# Paperclip reverse proxy: serve the React bundle, proxy /api and /stats
# /health to the backend container. SSE works through nginx as long as we
# disable buffering on the import-events route.

server {
    listen 80;
    server_name _;

    # Don't buffer Server-Sent Events streams; otherwise the browser
    # waits for the response to "complete" before receiving anything.
    location /api/v1/imports {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 200m;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }
    location /stats {
        proxy_pass http://backend:8000/stats;
    }

    # Hashed JS/CSS bundles are immutable; cache aggressively. The
    # filenames change on every build so cached versions are never
    # reused stale.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif)$ {
        root /usr/share/nginx/html;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # SPA: serve index.html for any unmatched path so React Router
    # owns client-side routing. ``index.html`` itself MUST NOT be
    # cached — it pins the bundle filenames the browser fetches.
    # Without these no-store headers, an upgraded backend can keep
    # serving the previous bundle to a returning user for hours.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires off;
    }
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        index index.html;
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }
}
