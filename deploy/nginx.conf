# Paperclip reverse proxy: serve the React bundle, proxy /api and /stats
# /health to the backend container. SSE works through nginx as long as we
# disable buffering on the import-events route.

server {
    listen 80;
    server_name _;

    # Don't buffer Server-Sent Events streams; otherwise the browser
    # waits for the response to "complete" before receiving anything.
    location /api/v1/imports {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 200m;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }
    location /stats {
        proxy_pass http://backend:8000/stats;
    }

    # SPA: serve index.html for any unmatched path so React Router
    # owns client-side routing.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        index index.html;
    }
}
