# Multi-user Paperclip deployment.
#
# Two services:
#   * `backend`   FastAPI + the Phase 1-10 pipeline modules + SQLite.
#   * `frontend`  nginx serving the React bundle AND reverse-proxying
#                 /api, /health, /stats to the backend container. The
#                 React bundle is *built inside Docker* (see
#                 frontend/Dockerfile), so the host machine never
#                 needs Node installed.
#
# Officers double-click the launcher (paperclip.bat / .command /
# .desktop) which runs `docker compose up -d --build` and opens the
# browser at http://localhost:${PAPERCLIP_PORT:-8080}/.
#
# `--build` on every launcher run guarantees that source changes
# (backend Python or frontend TypeScript) are picked up.

services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    image: paperclip-backend:latest
    restart: unless-stopped
    environment:
      FOIA_DB_PATH: /data/foia.db
      FOIA_ATTACHMENT_DIR: /data/attachments
      FOIA_EXPORT_DIR: /data/exports
      FOIA_INBOX_DIR: /data/inbox
      FOIA_CONFIG_FILE: /config/district.yaml
      FOIA_CORS_ORIGINS: ${PAPERCLIP_PUBLIC_ORIGIN:-http://localhost:8080}
      FOIA_LOG_LEVEL: INFO
      # Authentication: real LDAPS in production. Override these via
      # an .env file alongside this docker-compose.yml so secrets
      # don't end up in the image.
      PAPERCLIP_LDAP_URI: ${PAPERCLIP_LDAP_URI:-}
      PAPERCLIP_LDAP_BIND_DN: ${PAPERCLIP_LDAP_BIND_DN:-}
      PAPERCLIP_LDAP_BIND_PASSWORD: ${PAPERCLIP_LDAP_BIND_PASSWORD:-}
      PAPERCLIP_LDAP_USER_BASE_DN: ${PAPERCLIP_LDAP_USER_BASE_DN:-}
      PAPERCLIP_LDAP_USER_FILTER: ${PAPERCLIP_LDAP_USER_FILTER:-(sAMAccountName={username})}
      PAPERCLIP_LDAP_GROUP_DN: ${PAPERCLIP_LDAP_GROUP_DN:-}
      PAPERCLIP_LDAP_CA_CERT_PATH: ${PAPERCLIP_LDAP_CA_CERT_PATH:-}
      PAPERCLIP_LDAP_TIMEOUT_SECONDS: ${PAPERCLIP_LDAP_TIMEOUT_SECONDS:-10}
      PAPERCLIP_AUTH_LOCKOUT_THRESHOLD: ${PAPERCLIP_AUTH_LOCKOUT_THRESHOLD:-5}
      PAPERCLIP_AUTH_LOCKOUT_WINDOW_MINUTES: ${PAPERCLIP_AUTH_LOCKOUT_WINDOW_MINUTES:-15}
      PAPERCLIP_AUTH_SESSION_LIFETIME_HOURS: ${PAPERCLIP_AUTH_SESSION_LIFETIME_HOURS:-8}
      PAPERCLIP_AUTH_GROUP_RECHECK_MINUTES: ${PAPERCLIP_AUTH_GROUP_RECHECK_MINUTES:-15}
      # Dev mode: ON by default in this compose file so a brand-new
      # install can sign in without configuring LDAPS first. Flip to
      # "false" once you've wired up the directory.
      PAPERCLIP_AUTH_DEV_MODE: ${PAPERCLIP_AUTH_DEV_MODE:-true}
      PAPERCLIP_AUTH_DEV_USERS: ${PAPERCLIP_AUTH_DEV_USERS:-alice,bob}
    volumes:
      - ./data:/data
      - ./backend/config:/config:ro
    expose:
      - "8000"

  frontend:
    build:
      # Build context is the repo root so the Dockerfile can copy both
      # ``frontend/`` source and ``deploy/nginx.conf`` in one image.
      context: .
      dockerfile: frontend/Dockerfile
    image: paperclip-frontend:latest
    restart: unless-stopped
    ports:
      - "${PAPERCLIP_PORT:-8080}:80"
    depends_on:
      - backend
